<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Secret Scanner — Find Leaked Credentials on GitHub</title>
  <meta name="description" content="Scan GitHub repositories for leaked API keys, tokens, passwords, and other secrets. Detect AWS keys, GitHub tokens, Slack tokens, private keys, and more." />
  <meta name="keywords" content="secret scanner, credential leak, GitHub security, API key scanner, token detection, security audit" />
  <meta name="author" content="Secret Scanner" />
  <meta name="robots" content="index, follow" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Secret Scanner — Find Leaked Credentials on GitHub" />
  <meta property="og:description" content="Scan GitHub repositories for leaked API keys, tokens, passwords, and other secrets." />
  <meta property="og:site_name" content="Secret Scanner" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Secret Scanner — Find Leaked Credentials on GitHub" />
  <meta name="twitter:description" content="Scan GitHub repositories for leaked API keys, tokens, passwords, and other secrets." />

  <!-- Favicon (inline SVG) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔍</text></svg>" />
  <meta name="theme-color" content="#020810" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="page">

  <div class="hero" id="hero">
    <h1 class="logo">Secret Scanner</h1>
    <p class="tagline">Find leaked credentials across GitHub repositories.</p>

    <div class="search-box">
      <div class="search-row">
        <input id="username" type="text" placeholder="GitHub username" autocomplete="off" spellcheck="false" />
        <button id="actionBtn">Scan</button>
      </div>
    </div>

    <div class="token-row">
      <span class="token-label">Token</span>
      <input id="token" type="password" placeholder="ghp_... — optional, for private repos &amp; higher rate limits" autocomplete="off" />
    </div>
  </div>

  <div class="history-section" id="historySection">
    <div class="history-header">
      <span class="history-title">Previous Scans</span>
      <button class="history-clear" id="historyClear">Clear All</button>
    </div>
    <ul class="history-list" id="historyList"></ul>
  </div>

  <div class="results-area">
    <div class="progress-wrap">
      <div class="progress-track" id="progressTrack">
        <div class="progress-fill" id="bar"></div>
      </div>
      <div class="stats">
        Repos: <strong id="stat-repos">0</strong>
        &nbsp;&nbsp;Files: <strong id="stat-files">0</strong>
        &nbsp;&nbsp;Findings: <strong id="stat-matches">0</strong>
      </div>
      <div class="scan-status" id="scanStatus">
        <span class="pulse-dot" id="pulseDot"></span>
        <span id="scanStatusText"></span>
      </div>
    </div>

    <div class="rate-banner" id="rateBanner">
      <span class="rate-banner-icon">⏳</span>
      <span class="rate-banner-msg" id="rateBannerMsg"></span>
    </div>

    <div class="results-header">
      <div class="findings-count" id="findingsCount"></div>
      <button class="export-btn" id="exportBtn">Export JSON</button>
      <button class="share-btn" id="shareBtn">Share Link</button>
    </div>
    <div id="results"></div>
  </div>

</div>
<script type="module" src="js/app.js"></script>
</body>
</html>
